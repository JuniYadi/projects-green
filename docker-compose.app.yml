services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: pfnapp-web
    restart: unless-stopped
    ports:
      - "3300:3300"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?schema=public
    env_file:
      - .env
    networks:
      - pfnapp-net

  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: pfnapp-workers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'bun' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?schema=public
    env_file:
      - .env
    command: ["dumb-init", "--", "sh", "-c", "bun run worker:github & bun run worker:billing"]
    networks:
      - pfnapp-net

networks:
  pfnapp-net:
    name: pfnapp-net
    external: true
