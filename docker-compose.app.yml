services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: pfnapp-web
    restart: unless-stopped
    ports:
      - "3300:3300"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?schema=public
    env_file:
      - .env
    networks:
      - pfnapp-net

  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    container_name: pfnapp-workers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'bun' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?schema=public
    env_file:
      - .env
    command: ["dumb-init", "--", "sh", "-c", "bun run worker:github & bun run worker:billing"]
    networks:
      - pfnapp-net

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: pfnapp-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - pfnapp-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: pfnapp-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - pfnapp-net

volumes:
  opensearch-data:

networks:
  pfnapp-net:
    name: pfnapp-net
    external: true
