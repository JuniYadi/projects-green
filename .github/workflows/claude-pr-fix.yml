name: Claude Auto-Fix from Review

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix (required for manual trigger)'
        required: false
        type: number

concurrency:
  group: pr-fix-${{ github.event.pull_request.number || inputs.pr_number }}-${{ github.event.review.state }}
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'CHANGES_REQUESTED'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Determine PR number
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
            TARGET=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq '.base.ref')
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            TARGET="${{ github.event.pull_request.base.ref }}"
          fi
          echo "PR_NUMBER=$PR_NUM" >> $GITHUB_OUTPUT
          echo "TARGET_BRANCH=$TARGET" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch unresolved review threads
        id: review-threads
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM="${{ steps.pr-info.outputs.PR_NUMBER }}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          export PR_NUM OWNER REPO_NAME

          python3 << 'PYTHON_SCRIPT'
          import json, subprocess, sys, os

          owner = os.environ["OWNER"]
          repo = os.environ["REPO_NAME"]
          pr_num = os.environ["PR_NUM"]

          query = """
          {
            repository(owner: "%s", name: "%s") {
              pullRequest(number: %s) {
                reviewThreads(first: 100) {
                  nodes {
                    id
                    isResolved
                    path
                    originalLine
                    comments(first: 10) {
                      nodes {
                        id
                        body
                        author { login }
                      }
                    }
                  }
                }
              }
            }
          }
          """ % (owner, repo, pr_num)

          result = subprocess.run(
              ["gh", "api", "graphql", "-f", f"query={query}"],
              capture_output=True, text=True
          )

          if result.returncode != 0:
              print(f"GraphQL query failed: {result.stderr}", file=sys.stderr)
              sys.exit(1)

          data = json.loads(result.stdout)

          if "errors" in data:
              print(f"GraphQL errors: {data['errors']}", file=sys.stderr)
              sys.exit(1)

          threads = data["data"]["repository"]["pullRequest"]["reviewThreads"]["nodes"]

          unresolved = [t for t in threads if not t["isResolved"]]

          if not unresolved:
              print("No unresolved review threads found.")
              with open("/tmp/review_threads.md", "w") as f:
                  f.write("No unresolved review threads found.\n")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("HAS_THREADS=false\n")
              sys.exit(0)

          print(f"Found {len(unresolved)} unresolved review threads")

          with open("/tmp/review_threads.md", "w") as f:
              f.write(f"# Unresolved Review Threads ({len(unresolved)} issues)\n\n")
              for i, thread in enumerate(unresolved, 1):
                  path = thread["path"]
                  line = thread.get("originalLine") or "N/A"
                  comments = thread["comments"]["nodes"]
                  f.write(f"## Issue {i}: {path}:{line}\n\n")
                  for comment in comments:
                      author = comment["author"]["login"]
                      body = comment["body"]
                      f.write(f"**@{author}:**\n{body}\n\n")
                  f.write("---\n\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("HAS_THREADS=true\n")
          PYTHON_SCRIPT

      - name: Check for review threads
        if: steps.review-threads.outputs.HAS_THREADS != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "No unresolved review threads found. Nothing to fix."
          gh pr comment ${{ steps.pr-info.outputs.PR_NUMBER }} \
            --body "🤖 No unresolved review threads found. All comments appear to be resolved or no review comments exist."
          exit 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Prepare env file
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Create fix branch
        id: create-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use timestamp to prevent branch conflicts on retry
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          FIX_BRANCH="fix/pr-${{ steps.pr-info.outputs.PR_NUMBER }}-review-fixes-${TIMESTAMP}"
          echo "FIX_BRANCH=$FIX_BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$FIX_BRANCH"

      - name: Run Claude Code Fix
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 30
            --allowedTools "Bash(git *),Bash(bun *)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr-info.outputs.PR_NUMBER }}

            You are a senior software engineer applying fixes to address code review comments.

            First, read the unresolved review threads from `/tmp/review_threads.md`. This file contains ALL unresolved inline review comments from the PR with file paths, line numbers, and detailed issue descriptions.

            For each issue in the review threads:
            1. Read the file and line range mentioned
            2. Understand the issue described
            3. Apply the minimal fix
            4. Do NOT resolve the review thread (that happens automatically when the fix PR merges)

            IMPORTANT:
            1. Make the minimal changes necessary to fix each issue
            2. Run `bun run lint` and `bun run typecheck` after your changes
            3. If tests exist for modified code, run them
            4. Commit your changes with a conventional commit message: `fix: address review comments for PR #<${{ steps.pr-info.outputs.PR_NUMBER }}>`
            5. DO NOT push changes - I will handle that separately
            6. DO NOT resolve review threads - leave them for the maintainer to resolve after merge

      - name: Check for changes
        run: |
          if git diff-index --quiet HEAD --; then
            echo "No changes made. Exiting."
            exit 0
          fi

      - name: Push fix branch
        run: |
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          git push origin "$FIX_BRANCH"

      - name: Create fix PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          TARGET_BRANCH="${{ steps.pr-info.outputs.TARGET_BRANCH }}"

          printf '%s\n%s\n%s\n' \
            "🤖 Auto-generated fix for PR #${{ steps.pr-info.outputs.PR_NUMBER }}" \
            "" \
            "This PR applies the fixes requested in the code review. Please review and merge before merging your PR." \
            > /tmp/pr_body.txt

          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$FIX_BRANCH" \
            --title "fix: address review comments for PR #${{ steps.pr-info.outputs.PR_NUMBER }}" \
            --body-file /tmp/pr_body.txt

      - name: Post comment on original PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          FIX_PR_URL=$(gh pr view "$FIX_BRANCH" --json url --jq '.url')
          PR_NUM="${{ steps.pr-info.outputs.PR_NUMBER }}"
          printf '%s\n%s\n' "🤖 Auto-fix PR created: $FIX_PR_URL" "Please review the fix PR and merge it before merging this PR." > /tmp/comment.txt
          gh pr comment "$PR_NUM" --body-file /tmp/comment.txt

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "Workflow failed. Cleaning up fix branch..."
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          git push origin --delete "$FIX_BRANCH" 2>/dev/null || true
          echo "Cleanup complete. The original author can manually trigger again if needed."