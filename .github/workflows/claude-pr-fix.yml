name: Claude Auto-Fix from Review

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
        type: number

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Skip if not changes requested
        if: github.event_name == 'pull_request_review' && github.event.review.state != 'CHANGES_REQUESTED'
        run: |
          echo "Review did not request changes. Skipping fix workflow."
          exit 0

      - name: Determine PR number
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" == "pull_request_review" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
            echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          else
            echo "PR_NUMBER=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
            TARGET=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }} --jq '.base.ref')
            echo "TARGET_BRANCH=$TARGET" >> $GITHUB_OUTPUT
            echo "PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }} --jq '.user.login')" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get review body
        id: review-body
        run: |
          # Always fetch review body via API to avoid code injection
          gh api repos/${{ github.repository }}/pulls/${{ steps.pr-info.outputs.PR_NUMBER }}/reviews --jq '.[-1].body' > /tmp/review_body.md

      - name: Extract fix prompt
        id: fix-prompt
        run: |
          # Extract content between the markdown code blocks in the fix prompt section
          # Look for the raw prompt block between ``` markers
          FIX_PROMPT=$(sed -n '/<details>/,/<\/details>/p' /tmp/review_body.md | sed -n '/```/,/```/p' | sed '1d;$d')

          if [ -z "$FIX_PROMPT" ]; then
            echo "FIX_PROMPT=" >> $GITHUB_OUTPUT
            echo "No fix prompt found in review body"
            echo "HAS_FIX=false" >> $GITHUB_OUTPUT
          else
            # Remove leading/trailing whitespace
            FIX_PROMPT=$(echo "$FIX_PROMPT" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            echo "FIX_PROMPT<<EOF" >> $GITHUB_OUTPUT
            echo "$FIX_PROMPT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "HAS_FIX=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for fix prompt
        if: steps.fix-prompt.outputs.HAS_FIX != 'true'
        run: |
          echo "No fix prompt found. Posting comment and exiting."
          gh pr comment ${{ steps.pr-info.outputs.PR_NUMBER }} \
            --body "🤖 I couldn't find a fix prompt in the review. Please apply the requested changes manually or re-request review after adding fix instructions."
          exit 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Prepare env file
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Create fix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FIX_BRANCH="fix/pr-${{ steps.pr-info.outputs.PR_NUMBER }}-review-fixes"
          git checkout -b "$FIX_BRANCH"

      - name: Run Claude Code Fix
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 30
            --allowedTools "Bash(git *),Bash(bun *)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr-info.outputs.PR_NUMBER }}

            You are a senior software engineer applying fixes to address code review comments.

            Apply the following fixes to the code:

            ${{ steps.fix-prompt.outputs.FIX_PROMPT }}

            IMPORTANT:
            1. Make the minimal changes necessary to fix each issue
            2. Run `bun run lint` and `bun run typecheck` after your changes
            3. If tests exist for modified code, run them
            4. Commit your changes with a conventional commit message: `fix: address review comments for PR #<${{ steps.pr-info.outputs.PR_NUMBER }}>`
            5. DO NOT push changes - I will handle that separately

      - name: Check for changes
        run: |
          if git diff-index --quiet HEAD --; then
            echo "No changes made. Exiting."
            exit 0
          fi

      - name: Push fix branch
        run: |
          FIX_BRANCH="fix/pr-${{ steps.pr-info.outputs.PR_NUMBER }}-review-fixes"
          git push origin "$FIX_BRANCH"

      - name: Create fix PR
        run: |
          FIX_BRANCH="fix/pr-${{ steps.pr-info.outputs.PR_NUMBER }}-review-fixes"
          TARGET_BRANCH="${{ steps.pr-info.outputs.PR_TARGET_BRANCH }}"

          printf '%s\n%s\n%s\n' \
            "🤖 Auto-generated fix for PR #${{ steps.pr-info.outputs.PR_NUMBER }}" \
            "" \
            "This PR applies the fixes requested in the code review. Please review and merge before merging your PR." \
            > /tmp/pr_body.txt

          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$FIX_BRANCH" \
            --title "fix: address review comments for PR #${{ steps.pr-info.outputs.PR_NUMBER }}" \
            --body-file /tmp/pr_body.txt

      - name: Post comment on original PR
        run: |
          FIX_BRANCH="fix/pr-${{ steps.pr-info.outputs.PR_NUMBER }}-review-fixes"
          FIX_PR_URL=$(gh pr view "$FIX_BRANCH" --json url --jq '.url')
          PR_NUM="${{ steps.pr-info.outputs.PR_NUMBER }}"
          printf '%s\n%s\n' "🤖 Auto-fix PR created: $FIX_PR_URL" "Please review the fix PR and merge it before merging this PR." > /tmp/comment.txt
          gh pr comment "$PR_NUM" --body-file /tmp/comment.txt
