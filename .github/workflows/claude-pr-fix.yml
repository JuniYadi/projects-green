name: Claude Auto-Fix from Review

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix (required for manual trigger)'
        required: false
        type: number

concurrency:
  group: pr-fix-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'CHANGES_REQUESTED'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Determine PR number
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
            TARGET=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq '.base.ref')
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            TARGET="${{ github.event.pull_request.base.ref }}"
          fi
          echo "PR_NUMBER=$PR_NUM" >> $GITHUB_OUTPUT
          echo "TARGET_BRANCH=$TARGET" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get review body
        id: review-body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.pr-info.outputs.PR_NUMBER }}"
          # Fetch all reviews and find the most recent CHANGES_REQUESTED one with fix prompt
          gh api repos/${{ github.repository }}/pulls/$PR_NUM/reviews --paginate > /tmp/reviews.json
          python3 << 'PYTHON_SCRIPT'
          import json, sys

          with open('/tmp/reviews.json') as f:
              reviews = json.load(f)

          # Iterate from newest to oldest, find most recent CHANGES_REQUESTED review with fix prompt
          for review in reversed(reviews):
              if review.get("state") != "CHANGES_REQUESTED":
                  continue
              body = review.get("body", "")
              if not body:
                  continue
              if "<!-- FIX_PROMPT_START -->" in body or "<details>" in body:
                  with open("/tmp/review_body.md", "w") as f:
                      f.write(body)
                  print(f"Found fix prompt in review #{review.get('id', 'unknown')} by {review.get('user', {}).get('login', 'unknown')}")
                  sys.exit(0)

          print("No CHANGES_REQUESTED review with fix prompt found")
          sys.exit(1)
          PYTHON_SCRIPT

      - name: Extract fix prompt
        id: fix-prompt
        run: |
          # Use Python for robust markdown extraction with explicit error handling
          python3 << 'PYTHON_SCRIPT'
          import sys
          import re
          import os

          def set_output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{name}={value}\n")

          try:
            with open('/tmp/review_body.md', 'r') as f:
              content = f.read()

            # Find the <details> block
            details_match = re.search(r'<details>(.*?)</details>', content, re.DOTALL)
            if not details_match:
              set_output("HAS_FIX", "false")
              sys.exit(0)

            details_content = details_match.group(1)

            # Find code blocks (```) inside details
            code_blocks = re.findall(r'```(?:\w*)\n(.*?)```', details_content, re.DOTALL)
            if not code_blocks:
              set_output("HAS_FIX", "false")
              sys.exit(0)

            # Use the last/largest code block as the fix prompt
            fix_prompt = code_blocks[-1].strip()

            if not fix_prompt:
              set_output("HAS_FIX", "false")
              sys.exit(0)

            # Write to file for safe multi-line output
            with open('/tmp/fix_prompt.txt', 'w') as f:
              f.write(fix_prompt)

            set_output("HAS_FIX", "true")

          except Exception as e:
            print(f"ERROR: Failed to extract fix prompt: {e}", flush=True)
            set_output("HAS_FIX", "false")
            sys.exit(1)
          PYTHON_SCRIPT

      - name: Set fix prompt output
        if: steps.fix-prompt.outputs.HAS_FIX == 'true'
        run: |
          FIX_PROMPT=$(cat /tmp/fix_prompt.txt)
          echo "FIX_PROMPT<<EOF" >> $GITHUB_OUTPUT
          echo "$FIX_PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for fix prompt
        if: steps.fix-prompt.outputs.HAS_FIX != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "No fix prompt found. Posting comment and exiting."
          gh pr comment ${{ steps.pr-info.outputs.PR_NUMBER }} \
            --body "🤖 I couldn't find a fix prompt in the review. Please apply the requested changes manually or re-request review after adding fix instructions."
          exit 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Prepare env file
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Create fix branch
        id: create-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use timestamp to prevent branch conflicts on retry
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          FIX_BRANCH="fix/pr-${{ steps.pr-info.outputs.PR_NUMBER }}-review-fixes-${TIMESTAMP}"
          echo "FIX_BRANCH=$FIX_BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$FIX_BRANCH"

      - name: Run Claude Code Fix
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 30
            --allowedTools "Bash(git *),Bash(bun *)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr-info.outputs.PR_NUMBER }}

            You are a senior software engineer applying fixes to address code review comments.

            Apply the following fixes to the code:

            ${{ steps.fix-prompt.outputs.FIX_PROMPT }}

            IMPORTANT:
            1. Make the minimal changes necessary to fix each issue
            2. Run `bun run lint` and `bun run typecheck` after your changes
            3. If tests exist for modified code, run them
            4. Commit your changes with a conventional commit message: `fix: address review comments for PR #<${{ steps.pr-info.outputs.PR_NUMBER }}>`
            5. DO NOT push changes - I will handle that separately

      - name: Check for changes
        run: |
          if git diff-index --quiet HEAD --; then
            echo "No changes made. Exiting."
            exit 0
          fi

      - name: Push fix branch
        run: |
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          git push origin "$FIX_BRANCH"

      - name: Create fix PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          TARGET_BRANCH="${{ steps.pr-info.outputs.TARGET_BRANCH }}"

          printf '%s\n%s\n%s\n' \
            "🤖 Auto-generated fix for PR #${{ steps.pr-info.outputs.PR_NUMBER }}" \
            "" \
            "This PR applies the fixes requested in the code review. Please review and merge before merging your PR." \
            > /tmp/pr_body.txt

          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$FIX_BRANCH" \
            --title "fix: address review comments for PR #${{ steps.pr-info.outputs.PR_NUMBER }}" \
            --body-file /tmp/pr_body.txt

      - name: Post comment on original PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          FIX_PR_URL=$(gh pr view "$FIX_BRANCH" --json url --jq '.url')
          PR_NUM="${{ steps.pr-info.outputs.PR_NUMBER }}"
          printf '%s\n%s\n' "🤖 Auto-fix PR created: $FIX_PR_URL" "Please review the fix PR and merge it before merging this PR." > /tmp/comment.txt
          gh pr comment "$PR_NUM" --body-file /tmp/comment.txt

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "Workflow failed. Cleaning up fix branch..."
          FIX_BRANCH="${{ steps.create-branch.outputs.FIX_BRANCH }}"
          git push origin --delete "$FIX_BRANCH" 2>/dev/null || true
          echo "Cleanup complete. The original author can manually trigger again if needed."