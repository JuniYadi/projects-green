name: Coverage

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-coverage:
    name: Test Coverage (Bun + Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Show Bun version
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare test env file from .env.example
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage --timeout=30000 --max-concurrency=1

      - name: Verify LCOV output exists
        run: |
          test -f coverage/lcov.info
          echo "Found LCOV report at coverage/lcov.info"
          ls -lh coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unit
          name: bun-test-coverage
          fail_ci_if_error: false
          # Required for private repos. Public repos with Codecov GitHub App
          # can often upload without this secret.
          token: ${{ secrets.CODECOV_TOKEN }}
