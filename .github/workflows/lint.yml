name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: ESLint
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Show Bun version
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare test env file from .env.example
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run ESLint
        run: bun run lint

  format:
    name: Prettier
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Show Bun version
        run: |
          bun --version
          node --version

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Prettier check
        run: bunx prettier --check "**/*.{ts,tsx}"
