name: Claude Auto Review with Tracking
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Skip fix PRs
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          if [ "$AUTHOR" == "github-actions[bot]" ]; then
            echo "Skipping: Fix PR created by bot"
            exit 0
          fi

          if [[ "$BRANCH" == fix/pr-* ]]; then
            echo "Skipping: Fix PR branch"
            exit 0
          fi

      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Show Bun version
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare test env file from .env.example
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Claude Code Review Loop
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true
          show_full_output: false
          display_report: true
          use_sticky_comment: true
          allowed_bots: "github-actions,claude"
          plugin_marketplaces: "https://github.com/DietrichGebert/ponytail.git"
          plugins: "ponytail@ponytail"
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 200
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api *)"
          prompt: |
            /ponytail:ponytail
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ROLE & PERSONA (CRITICAL):
            You are a rigorous, highly critical Staff Engineer reviewing code.
            - DO NOT be overly agreeable or a "yes man".
            - You MUST actively hunt for edge cases, performance bottlenecks, architectural flaws, security vulnerabilities, and logic errors.
            - If the code is sloppy, overly complex, or inefficient, call it out directly. Do not sugarcoat your feedback.
            - Hold the code to the absolute highest standard of production readiness.
            - Be direct and professional. "This code is confusing and misses the X edge case" is better than "Consider refactoring if you have time".

            INSTRUCTIONS:

            MANDATORY FIRST STEP — BUILD YOUR DIFF MANIFEST:
            Run `gh pr diff ${{ github.event.pull_request.number }}` and store the FULL output.
            This is your SOLE source of truth for file paths and line numbers.
            You MUST ONLY reference files and line numbers that appear in this diff output.
            Any file path or line number NOT in this diff is INVALID — do NOT attempt to post inline comments on them.

            1. Scan all existing comments and review threads on this PR using `gh api graphql`:
               ```
               gh api graphql -f query='
               {
                 repository(owner: "JuniYadi", name: "projects-green") {
                   pullRequest(number: <PR_NUMBER>) {
                     reviewThreads(first: 50) {
                       nodes {
                         id
                         isResolved
                         outdated
                         path
                         originalLine
                         comments(first: 10) {
                           nodes {
                             id
                             body
                             outdated
                           }
                         }
                       }
                     }
                   }
                 }
               }'
               ```
            2. For every review thread found:
              - If thread is OUTDATED (code changed, thread no longer applies):
                - Post a reply "🔄 Thread outdated: code has changed" to the thread.
                - Resolve the thread using: `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "<THREAD_ID>"}) { thread { id isResolved } } }'`
              - If it's a PREVIOUS issue that is now fixed:
                - Post a reply "✅ Fixed in latest commit" to the thread.
                - Resolve the thread using `gh api graphql` (`resolveReviewThread`).
              - If it's a PREVIOUS issue that is STILL present:
                - Post a reply "❌ PERSISTENT: This issue still exists in the latest changes." to the thread.
                - Do NOT resolve it.
              - If it's a NEW issue:
                - CRITICAL: Before posting, VERIFY the file path and line number exist in your PR diff manifest. If the path or line is NOT in the diff, SKIP the inline comment and add it to review_body.md instead.
                - Use `mcp__github_inline_comment__create_inline_comment` to post the finding directly on the line.
                - Start the comment with "🆕 NEW ISSUE:".
                - If the MCP tool fails (any error), add the finding to `review_body.md` instead of retrying.

            CRITICAL: Every finding SHOULD have an inline comment when the target file and line exist in the PR diff. If the MCP tool fails or the target cannot be resolved, add the finding to review_body.md instead. The review MUST always be submitted regardless.

            IMPORTANT: After resolving all outdated threads, re-scan the code for NEW issues. An outdated thread may mean the code was rewritten and a NEW issue now exists at that location. Remember: only review files that appear in the PR diff — do not comment on files outside this PR.
            BLOCKING ISSUE TRACKING:
            Maintain a single mental list named "blocking_issues". Add ONE item to blocking_issues for each of the following:
              - Every 🆕 NEW ISSUE you identify during the re-scan.
              - Every ❌ PERSISTENT issue that remains unresolved.
              - Every finding that could not be posted as an inline comment (MCP tool failure or missing from diff).
              - Any review-blocking tool or data failure (e.g., cannot read the PR diff or review threads).
            Inline comments are evidence, not a verdict. If blocking_issues has any item, the final action MUST be a request-changes review. If blocking_issues is empty, the final action MUST be an approval.


            REVIEW SUBMISSION LOGIC:
            You MUST end every successful workflow run by submitting exactly one formal PR review verdict with `gh pr review`: either `--request-changes` or `--approve`. Never finish with only inline comments, sticky comments, or `gh pr comment`.

            DECISION PATH:

            PATH A — CLEAN (no blocking issues):
            If blocking_issues is empty after thread reconciliation and the new scan:
              Execute: `gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM! All issues have been addressed."`

            PATH B — BLOCKING ISSUES EXIST:
            If blocking_issues has any item:
              STEP 1: Create or update `review_body.md`.

              --- START OF review_body.md TEMPLATE ---
              ## PR Review Summary

              I've identified **[N blocking issue(s)]** that require attention before this PR can be merged.

              ### 🆕 NEW ISSUES / ❌ PERSISTENT ISSUES

              (List all findings here with file path, line range, and issue description.
              Only include items that are NOT already posted as inline comments.
              Items that already have inline comments do NOT need to be listed here —
              just mention the count.)

              ---

              ### 💻 AI Refactoring Prompt

              <details>
                <summary>📦 Click to expand and copy full prompt for Local AI Assistant</summary>

                ````markdown
                You are a senior software engineer executing a local PR review remediation sweep for REPO ${{ github.repository }} PR #${{ github.event.pull_request.number }}. Keep working in same branch with the PR branch and commit after you do the changes. then push to the same branch. Do NOT open a new PR.
                Refactor and fix the following specific code locations according to these instructions:

                #### File: [Insert File Path]
                - **Status:** [❌ PERSISTENT | 🆕 NEW]
                - **Target Line Range:** [e.g., lines 45-52]
                - **Issue:** [Briefly state what is wrong]
                - **Requested Fix:**

                ```[language]
                // Exact code patch or snippet to implement
                ```

                [Include ALL active issues here. Do not include ✅ FIXED items.]
                ````

              </details>
              --- END OF review_body.md TEMPLATE ---

              STEP 2: Execute: `gh pr review ${{ github.event.pull_request.number }} --request-changes -F review_body.md`

            PATH C — REVIEW FAILURE:
            If the review cannot be completed because required data or tools fail (e.g., cannot read PR diff, cannot fetch review threads):
              Create `review_body.md` with a ## PR Review Summary section, a short failure reason, and whatever actionable command/log detail is available.
              Then execute: `gh pr review ${{ github.event.pull_request.number }} --request-changes -F review_body.md`

            POST-SUBMIT VERIFICATION:
            After `gh pr review` exits successfully, run:
              `gh pr view ${{ github.event.pull_request.number }} --json reviews --jq '.reviews[-1].state'`
            Confirm the printed state is "APPROVED" or "CHANGES_REQUESTED". If `gh pr review` exits nonzero, retry the same verdict command once. If the retry fails or the verified state is missing/any other value, print a clear error message to the workflow log rather than posting a PR comment.
