name: Claude Auto Review with Tracking
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Show Bun version
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare test env file from .env.example
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Claude Code Review Loop
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true 
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api *)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            INSTRUCTIONS:
            1. Scan all existing comments on this PR. Find the latest summary comment posted by @github-actions[bot] or yourself.
            2. For every issue identified in previous runs:
              - Check if it still exists in the current diff.
              - If fixed, mark it as "✅ FIXED" in your new summary.
              - If still present, mark it as "❌ PERSISTENT".
            3. Update the top-level PR summary comment instead of creating a new one if possible (use `gh api` to find and patch).
            4. Focus your review on:
              - Code quality, bugs, performance, and security.
              - Provide emoji-based approval status.

            REVIEW STATUS LOGIC:
            After updating the summary and posting inline comments:
            1. If there are ANY "🆕 NEW" or "❌ PERSISTENT" issues that are functional bugs, security risks, or major code quality violations:
              Execute `gh pr review --request-changes --body "I've identified issues that need addressing. Please see the summary comment and inline feedback."`
            2. If there are NO unresolved functional issues (only "✅ FIXED" items or minor suggestions):
              Execute `gh pr review --approve --body "LGTM! All previous issues have been addressed."`

            INLINE ACTIONS:
            Use your inline comment tool (`mcp__github_inline_comment__create_inline_comment`) for new issues.

            RESOLVING THREADS:
            For every existing review thread:
            1. If the issue is fixed or the comment is "outdated" (code changed), use `gh api graphql` with `resolveReviewThread` to mark it as resolved.
            2. Before resolving, post a final reply in the thread (e.g., "✅ Fixed in latest commit").

            FINAL COMPREHENSIVE SUMMARY COMMENT REQUIREMENT:
            Post or update a top-level PR summary comment.
            Keep a "History" section or ensure the "Local Refactoring Prompt" contains ALL current issues (both persistent and new).

            Format the refactoring section exactly like this:

            ### 💻 Local Refactoring Prompt
            <details>
            <summary>📦 Click to expand and copy full prompt for Local AI Assistant</summary>

            ````markdown
            You are a senior software engineer executing a local PR review remediation sweep.
            Please refactor and fix the following specific code locations according to these instructions:

            ---
            #### File: [Insert File Path]
            **Status:** [❌ PERSISTENT | 🆕 NEW]
            **Target Line Range:** [e.g., lines 45-52]
            **Issue:** [Briefly state what is wrong]
            **Requested Fix:**

            ```[language]
            // Exact code patch or snippet to implement
            ```
            ---

            [Include all active issues here. Do not include ✅ FIXED items in this raw prompt block to keep it actionable.]
            </details>

            CRITICAL: Use `gh api` to retrieve existing comments and `gh api -X PATCH` to update the summary comment to avoid noise.

