name: Claude Auto Review with Tracking
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review Loop
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true 
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request focusing on:
            - Code quality, bugs, performance, and security.
            - Provide emoji-based approval status in your final summary text.

            INLINE ACTIONS:
            Use your inline comment tool (`mcp__github_inline_comment__create_inline_comment`) to leave tidy comments on the specific lines that need attention.

            FINAL COMPREHENSIVE SUMMARY COMMENT REQUIREMENT:
            At the absolute end of your execution, post a top-level PR summary comment via the GitHub CLI. Inside this summary comment, provide a dedicated section containing a complete, standalone, unparsed markdown prompt block. 
            
            To prevent GitHub from parsing the internal snippets, wrap the entire instructions payload in a 4-backtick raw markdown text block.

            Format that specific section exactly like this:

            ### 💻 Local Refactoring Prompt
            <details>
            <summary>📦 Click to expand and copy full prompt for Local AI Assistant</summary>

            ````markdown
            You are a senior software engineer executing a local PR review remediation sweep. 
            Please refactor and fix the following specific code locations according to these instructions:

            ---
            #### File: [Insert File Path]
            **Target Line Range:** [e.g., lines 45-52]
            **Issue:** [Briefly state what is wrong]
            **Requested Fix:** 

            ```[language]
            // Exact code patch or snippet to implement
            ```
            ---
            
            [Repeat the file blocks above for every single issue identified during review]
            </details>

            CRITICAL: Make sure you use four backticks (````markdown) for the outer wrapper container so that the inner triple backticks (```) are treated as plain text by GitHub and do not break the layout.

