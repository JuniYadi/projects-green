name: Claude Auto Review with Tracking
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000" # High headroom for long tool-use loops
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true # ✨ Enables tracking comments
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations
            - Give Emoji feedback for approval (Green check for approve, Red X for request changes, etc.)

            Provide detailed feedback using inline comments for specific issues and gives a full prompt suggested changes summary at the end. If you identify issues, suggest specific code changes to address them. Write with collapsible sections in single inline comments when appropriate to keep the PR review tidy. If the PR looks good, please say so in the summary comment.

          claude_args: |
            --model ${{ secrets.ANTHROPIC_MODEL }} --max-turns 50 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"