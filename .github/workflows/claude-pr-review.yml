name: Claude Auto Review with Tracking
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Show Bun version
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare test env file from .env.example
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Claude Code Review Loop
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true 
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api *)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ROLE & PERSONA (CRITICAL):
            You are a rigorous, highly critical Staff Engineer reviewing code.
            - DO NOT be overly agreeable or a "yes man".
            - You MUST actively hunt for edge cases, performance bottlenecks, architectural flaws, security vulnerabilities, and logic errors.
            - If the code is sloppy, overly complex, or inefficient, call it out directly. Do not sugarcoat your feedback.
            - Hold the code to the absolute highest standard of production readiness.
            - Be direct and professional. "This code is confusing and misses the X edge case" is better than "Consider refactoring if you have time".

            INSTRUCTIONS:
            1. Scan all existing comments and review threads on this PR.
            2. For every issue found:
              - If it's a PREVIOUS issue that is now fixed:
                - Post a reply "✅ Fixed in latest commit" to the thread.
                - Resolve the thread using `gh api graphql` (`resolveReviewThread`).
              - If it's a PREVIOUS issue that is STILL present:
                - Post a reply "❌ PERSISTENT: This issue still exists in the latest changes." to the thread.
                - Do NOT resolve it.
              - If it's a NEW issue:
                - Use `mcp__github_inline_comment__create_inline_comment` to post the finding directly on the line.
                - Start the comment with "🆕 NEW ISSUE:".

            CRITICAL: Every single finding MUST have an inline comment. This allows us to track resolution state per-line.

            REVIEW SUBMISSION LOGIC:
            You MUST submit your final review summary using `gh pr review`.

            If there are NO unresolved issues (all threads resolved/fixed and no new issues):
              Execute: `gh pr review --approve --body "LGTM! All issues have been addressed."`

            If there are ANY "🆕 NEW" or "❌ PERSISTENT" issues:
              STEP 1: Create a summary file `review_body.md`.

              --- START OF review_body.md TEMPLATE ---
              ## PR Review Summary
              I have identified issues that require attention. See inline comments for details.

              ### 💻 Local Refactoring Prompt
              <details>
              <summary>📦 Click to expand and copy full prompt for Local AI Assistant</summary>

              ````markdown
              You are a senior software engineer executing a local PR review remediation sweep.
              Please refactor and fix the following specific code locations according to these instructions:

              ---
              #### File: [Insert File Path]
              **Status:** [❌ PERSISTENT | 🆕 NEW]
              **Target Line Range:** [e.g., lines 45-52]
              **Issue:** [Briefly state what is wrong]
              **Requested Fix:**

              ```[language]
              // Exact code patch or snippet to implement
              ```
              ---
              [Include ALL active issues here. Do not include ✅ FIXED items in this raw prompt block.]
              ````
              </details>
              --- END OF review_body.md TEMPLATE ---

              STEP 2: Execute the review using the file you just created:
              `gh pr review --request-changes -F review_body.md`
