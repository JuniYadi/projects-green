name: Claude Auto Review with Tracking
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review Loop
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "3000000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: true 
          claude_args: >-
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api *)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            INSTRUCTIONS:
            1. Scan all existing comments on this PR. Find the latest summary comment posted by @github-actions[bot] or yourself.
            2. For every issue identified in previous runs:
               - Check if it still exists in the current diff.
               - If fixed, mark it as "✅ FIXED" in your new summary.
               - If still present, mark it as "❌ PERSISTENT".
            3. Update the top-level PR summary comment instead of creating a new one if possible (use `gh api` to find and patch).
            4. Focus your review on:
               - Code quality, bugs, performance, and security.
               - Provide emoji-based approval status.

            INLINE ACTIONS:
            Use your inline comment tool (`mcp__github_inline_comment__create_inline_comment`) for new issues. If an issue was previously commented on but is now fixed, reply to that thread stating it's resolved.

            FINAL COMPREHENSIVE SUMMARY COMMENT REQUIREMENT:
            Post or update a top-level PR summary comment.
            Keep a "History" section or ensure the "Local Refactoring Prompt" contains ALL current issues (both persistent and new).

            Format the refactoring section exactly like this:

            ### 💻 Local Refactoring Prompt
            <details>
            <summary>📦 Click to expand and copy full prompt for Local AI Assistant</summary>

            ````markdown
            You are a senior software engineer executing a local PR review remediation sweep.
            Please refactor and fix the following specific code locations according to these instructions:

            ---
            #### File: [Insert File Path]
            **Status:** [❌ PERSISTENT | 🆕 NEW]
            **Target Line Range:** [e.g., lines 45-52]
            **Issue:** [Briefly state what is wrong]
            **Requested Fix:**

            ```[language]
            // Exact code patch or snippet to implement
            ```
            ---

            [Include all active issues here. Do not include ✅ FIXED items in this raw prompt block to keep it actionable.]
            </details>

            CRITICAL: Use `gh api` to retrieve existing comments and `gh api -X PATCH` to update the summary comment to avoid noise.

