name: Agent Orchestrator
on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID (e.g., PGREEN-097)'
        required: true
        type: string
      branch:
        description: 'Branch on projects-green (e.g., feature/PGREEN-097)'
        required: true
        type: string
      pr_id:
        description: 'PR number (optional ŌĆö avoids branch lookup)'
        required: false
        type: string
      mode:
        description: 'plan | execute | fix'
        required: true
        type: choice
        options: [plan, execute, fix]

env:
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  API_TIMEOUT_MS: "3000000"
  GIT_EMAIL: 31454084+JuniYadi@users.noreply.github.com

jobs:
  plan:
    if: inputs.mode == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Fetch task file + context via API
        id: task
        env:
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        run: |
          # Find task file from directory listing
          TASK_ID="${{ inputs.task_id }}"
          gh api repos/JuniYadi/ide-projects/contents/projects-green/_tasks/active \
            --jq '.[] | select(.type == "file" and (.name | startswith($task_id))) | "\(.path)|\(.sha)"' \
            --arg task_id "$TASK_ID" > /tmp/task-entry.txt
          if [ ! -s /tmp/task-entry.txt ]; then
            echo "::error::Task file not found for ${{ inputs.task_id }} in ide-projects/projects-green/_tasks/active/"
            exit 1
          fi
          IFS='|' read -r TASK_PATH TASK_SHA < /tmp/task-entry.txt
          echo "task_path=$TASK_PATH" >> "$GITHUB_OUTPUT"
          echo "task_sha=$TASK_SHA" >> "$GITHUB_OUTPUT"

          # Download task file content
          gh api "repos/JuniYadi/ide-projects/contents/$TASK_PATH" \
            --jq '.content' | base64 -d > /tmp/task.md
          echo "task_file=/tmp/task.md" >> "$GITHUB_OUTPUT"

          # Also fetch AGENTS.md, RULES.md, FEATURES.md
          for f in "projects-green/AGENTS.md" "RULES.md" "projects-green/FEATURES.md"; do
            gh api "repos/JuniYadi/ide-projects/contents/$f" \
              --jq '.content' 2>/dev/null | base64 -d > "/tmp/$(basename $f)" 2>/dev/null || true
          done

          echo "task_filename=$(basename "$TASK_PATH")" >> "$GITHUB_OUTPUT"
          echo "task_dir=/tmp" >> "$GITHUB_OUTPUT"

      - name: Claude Code ŌĆö Write Plan
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          display_report: true
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model ${{ secrets.PLAN_ANTHROPIC_MODEL }}
            --max-turns 125
            --dangerously-skip-permissions
            --allowedTools "Bash(cat*),Bash(git*),Bash(head*),Bash(date*),Bash(sed*),Bash(echo*),Bash(tee*),Bash(ls*),Bash(find*)"
          prompt: |
            /ponytail:ponytail
            REPO: JuniYadi/projects-green (Next.js 16 + TypeScript + strict + Bun)
            IDE PROJECTS: JuniYadi/ide-projects (private ŌĆö planning docs)
            TASK FILE: /tmp/task.md

            YOUR ROLE:
            You are a senior software engineer writing an implementation plan. You work with files in /tmp/.
            - /tmp/task.md ŌĆö read task spec, write plan, save back
            - You DON'T touch the source code ŌĆö this is plan-only

            STEP 1 ŌĆö READ CONTEXT:
            Read the task file:
            `cat /tmp/task.md`

            Read the project AGENTS.md:
            `cat /tmp/AGENTS.md`

            Read FEATURES.md if the task references a feature area:
            `head -200 /tmp/FEATURES.md`

            Read RULES.md for git/task conventions:
            `cat /tmp/RULES.md`

            STEP 2 ŌĆö UNDERSTAND THE TASK:
            - What is the goal?
            - What files need to change (check projects-green/ directory structure)?
            - What is the technical approach?
            - What are the acceptance criteria?
            - Are there existing tests for the affected area?

            STEP 3 ŌĆö WRITE THE PLAN:
            Fill the `## Plan` section in /tmp/task.md. The template expects:

            1. ### Approach ŌĆö self-contained technical description
            2. ### Files to Create / Modify ŌĆö table with Action, File, Description
            3. ### Key Implementation Details ŌĆö specific code notes, edge cases
            4. ### Questions / Blockers ŌĆö or Ō£ģ None

            Use this EXACT format:
            ```
            ## Plan

            > **Status:** Ō£ģ Done
            > **Generated:** $(date +%Y-%m-%d\ %H:%M)

            ### Approach
            ...
            ```

            Update `## Current Status:` line to `plan` (it should already be `plan` or `draft`).

            Save the file when done. Do NOT try to git commit, git push, or use gh ŌĆö just write to /tmp/task.md.

      - name: Push plan back to ide-projects
        env:
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        run: |
          NEW_CONTENT=$(base64 -w0 < /tmp/task.md)
          gh api "repos/JuniYadi/ide-projects/contents/${{ steps.task.outputs.task_path }}" \
            -X PUT \
            -f message="task: ${{ inputs.task_id }} plan generated" \
            -f content="$NEW_CONTENT" \
            -f sha="${{ steps.task.outputs.task_sha }}" \
            -f committer.name="JuniYadi" \
            -f committer.email="${{ env.GIT_EMAIL }}"

  execute:
    if: inputs.mode == 'execute'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Fetch task file from ide-projects
        id: task
        env:
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        run: |
          TASK_ID="${{ inputs.task_id }}"
          gh api repos/JuniYadi/ide-projects/contents/projects-green/_tasks/active \
            --jq '.[] | select(.type == "file" and (.name | startswith($task_id))) | "\(.path)|\(.sha)"' \
            --arg task_id "$TASK_ID" > /tmp/task-entry.txt
          if [ ! -s /tmp/task-entry.txt ]; then
            echo "::error::Task file not found for ${{ inputs.task_id }} in ide-projects/projects-green/_tasks/active/"
            exit 1
          fi
          IFS='|' read -r TASK_PATH TASK_SHA < /tmp/task-entry.txt
          echo "task_path=$TASK_PATH" >> "$GITHUB_OUTPUT"
          echo "task_sha=$TASK_SHA" >> "$GITHUB_OUTPUT"

          gh api "repos/JuniYadi/ide-projects/contents/$TASK_PATH" \
            --jq '.content' | base64 -d > /tmp/task.md
          echo "$TASK_SHA" > /tmp/task.sha

      - name: Checkout projects-green @ branch
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/projects-green
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch }}
          path: projects-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Show versions
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare env + install deps
        working-directory: projects-green
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            # Skip known secret keys ŌĆö avoid leaking to logs
            case "$key" in
              *DATABASE*|*REDIS*|*SECRET*|*KEY*|*TOKEN*|*PASSWORD*|*WORKOS*|*GITHUB*|*ANTHROPIC*|*AUTH*)
                continue ;;
            esac
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done
          bun install --frozen-lockfile
          bun run db:generate

      - name: Claude Code ŌĆö Implement
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          display_report: true
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model ${{ secrets.EXECUTE_ANTHROPIC_MODEL }}
            --max-turns 200
            --dangerously-skip-permissions
            --allowedTools "Bash(bun*),Bash(node*),Bash(npx*),Bash(git*),Bash(gh*),Bash(cat*),Bash(find*),Bash(grep*),Bash(ls*),Bash(cp*),Bash(mv*),Bash(rm*),Bash(sed*),Bash(mkdir*),Bash(touch*),Bash(tee*),Bash(date*),Bash(which*),Bash(dirname*),Bash(basename*),Bash(sort*),Bash(uniq*),Bash(wget*),Bash(curl*)"
          prompt: |
            /ponytail:ponytail
            REPO: JuniYadi/projects-green
            WORKING DIRECTORY: projects-green/
            TASK FILE: /tmp/task.md
            BRANCH: ${{ inputs.branch }}

            YOUR ROLE:
            You are a senior software engineer implementing a task. You work with:
            - /tmp/task.md ŌĆö the task spec + plan (fetched from ide-projects)
            - projects-green/ ŌĆö THIS is where you write code

            IMPORTANT: All git operations for projects-green happen INSIDE `projects-green/`.
            Task file is at `/tmp/task.md` ŌĆö do NOT use git on it, just edit the local file.

            STEP 1 ŌĆö READ CONTEXT:
            `cat /tmp/task.md` ŌĆö read the full task + plan

            `cat /tmp/AGENTS.md` ŌĆö project AGENTS.md

            `cat projects-green/AGENTS.md` ŌĆö repo rules (Prisma types, DTO layer, etc.)

            `ls projects-green/modules/` ŌĆö see all feature modules

            STEP 2 ŌĆö LIST ACCEPTANCE CRITERIA:
            Parse the task file and list all unchecked AC checkboxes:
            `grep -- '- \\[ \\]' /tmp/task.md` ŌĆö these are your ACs.

            STEP 3 ŌĆö AC-BY-AC LOOP (one AC at a time):
            For EACH unchecked Acceptance Criteria, in order. Continue until all are marked [x].

            3a. IMPLEMENT THIS AC:
            - Pick ONE AC (e.g. "Add step/status to VpnAuditLog")
            - Work ONLY on files relevant to this AC
            - Read current file if modifying, then make the change
            - Run relevant tests: `cd projects-green && bun test --bail`

            3b. COMMIT + PUSH (progress checkpoint):
            ```bash
            cd projects-green
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            SHORT_DESC=$(echo "[AC description]" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | cut -c1-50)
            git add -A
            git commit -m "feat(${{ inputs.task_id }}): $SHORT_DESC"
            git push
            ```

            3c. UPDATE TASK FILE ŌĆö mark AC done + record commit SHA (via GitHub API, no checkout needed):
            ```bash
            COMMIT_SHA=$(cd projects-green && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            # Mark the first unchecked checkbox as [x] with SHA in LOCAL file
            sed -i "0,/^- \[ \]/{s//- [x] ($COMMIT_SHA)/}" /tmp/task.md
            # Push via GitHub API ŌĆö no git operations needed
            NEW_CONTENT=$(base64 -w0 < /tmp/task.md)
            CURRENT_SHA=$(cat /tmp/task.sha)
            gh api repos/JuniYadi/ide-projects/contents/${{ steps.task.outputs.task_path }} \
              -X PUT \
              -f message="task: ${{ inputs.task_id }} ŌĆö $SHORT_DESC done [sha:$COMMIT_SHA]" \
              -f content="$NEW_CONTENT" \
              -f sha="$CURRENT_SHA" \
              -f committer.name="JuniYadi" \
              -f committer.email="31454084+JuniYadi@users.noreply.github.com" \
              --jq '.content.sha' > /tmp/task.sha
            ```
            --- IMPORTANT ---
            After pushing code, a new GHA run may auto-trigger on the branch. Keep working.
            If you run out of turns partway through, that's OK ŌĆö pushed code and
            updated checklist mean the next run picks up where you left off.
            All done with this AC. Loop back to 3a for the next unchecked one.

            STEP 4 ŌĆö FINAL 3 PILLARS (once, after ALL ACs done):
            Run each separately. Fix, amend the LAST commit, and push before moving to the next.

            4a. `cd projects-green && bun run lint` ŌĆö 0 errors
            If it fails, fix the lint errors, then:
            `git add -A && git commit --amend --no-edit && git push --force-with-lease`

            4b. `cd projects-green && bun run typecheck` ŌĆö 0 errors
            If it fails, fix the type errors, then:
            `git add -A && git commit --amend --no-edit && git push --force-with-lease`

            4c. `cd projects-green && bun run test` ŌĆö all pass
            If it fails, fix the test failures, then:
            `git add -A && git commit --amend --no-edit && git push --force-with-lease`

            If any pillar fails and you can't fix it in time, push the fix anyway
            (even with errors) ŌĆö the code is already checkpointed per AC.

            STEP 5 ŌĆö MARK PR READY:
            ```bash
            PR_NUMBER=$(gh pr list --head "${{ inputs.branch }}" --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$PR_NUMBER" ]; then
              gh pr ready "$PR_NUMBER"
              echo "PR #$PR_NUMBER marked as ready for review"
            else
              echo "No open PR found for branch ${{ inputs.branch }}"
            fi
            ```

            STEP 6 ŌĆö UPDATE /tmp/task.md WITH FINAL STATUS (the workflow will push it via API):
            Update the local /tmp/task.md with implementation status. Do NOT use git.
            ```bash
            BRANCH_NAME="${{ inputs.branch }}"
            PR_URL=$(cd projects-green && gh pr list --repo JuniYadi/projects-green --head "$BRANCH_NAME" --json number,url --jq '.[0]' 2>/dev/null || echo "{}")
            PR_NUMBER=$(echo "$PR_URL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('number',''))" 2>/dev/null || echo "")
            TASK_FILE=/tmp/task.md

            # Update overall status
            sed -i 's/^## Current Status:.*/## Current Status: `implementation`/' "$TASK_FILE"

            # Update Implementation section ŌĆö status & date
            sed -i 's/> \*\*Status:\*\* .*/> **Status:** Ō£ģ Done/' "$TASK_FILE"
            TODAY=$(date +%Y-%m-%d)
            sed -i 's/> \*\*Implemented:\*\* .*/> **Implemented:** '"$TODAY"'/' "$TASK_FILE"

            # Populate Files Changed from PR
            if [ -n "$PR_NUMBER" ]; then
              FILES_LIST=$(cd projects-green && gh pr view "$PR_NUMBER" --json files --jq '.files[].path' 2>/dev/null || true)
              if [ -n "$FILES_LIST" ]; then
                sed -i '/^\[To be filled after implementation\]$/d' "$TASK_FILE"
                echo "$FILES_LIST" | while IFS= read -r f; do
                  sed -i '/^### Files Changed$/a\- `'"$f"'`' "$TASK_FILE"
                done
              fi
            fi

            # Update PR details
            sed -i '/^### PR Details$/a\\' "$TASK_FILE"
            sed -i '/^### PR Details$/a- **PR URL:** https://github.com/JuniYadi/projects-green/pull/'"$PR_NUMBER" "$TASK_FILE"
            sed -i '/^### PR Details$/a- **Branch:** `'"$BRANCH_NAME"'`' "$TASK_FILE"
            ```

            DONE ŌĆö /tmp/task.md now has the final implementation status.

      - name: Push final task status to ide-projects
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        run: |
          if [ -f /tmp/task.md ] && [ -f /tmp/task.sha ]; then
            NEW_CONTENT=$(base64 -w0 < /tmp/task.md)
            CURRENT_SHA=$(cat /tmp/task.sha)
            gh api "repos/JuniYadi/ide-projects/contents/${{ steps.task.outputs.task_path }}" \
              -X PUT \
              -f message="task: ${{ inputs.task_id }} implementation done" \
              -f content="$NEW_CONTENT" \
              -f sha="$CURRENT_SHA" \
              -f committer.name="JuniYadi" \
              -f committer.email="31454084+JuniYadi@users.noreply.github.com"
            echo "Ō£ģ Final task status pushed to ide-projects"
          else
            echo "ŌÜĀ’ĖÅ /tmp/task.md or /tmp/task.sha not found ŌĆö skipping push"
          fi

  fix:
    if: inputs.mode == 'fix'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Fetch task file from ide-projects
        id: task
        env:
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        run: |
          TASK_ID="${{ inputs.task_id }}"
          gh api repos/JuniYadi/ide-projects/contents/projects-green/_tasks/active \
            --jq '.[] | select(.type == "file" and (.name | startswith($task_id))) | "\(.path)|\(.sha)"' \
            --arg task_id "$TASK_ID" > /tmp/task-entry.txt
          if [ ! -s /tmp/task-entry.txt ]; then
            echo "::error::Task file not found for ${{ inputs.task_id }} in ide-projects/projects-green/_tasks/active/"
            exit 1
          fi
          IFS='|' read -r TASK_PATH TASK_SHA < /tmp/task-entry.txt
          echo "task_path=$TASK_PATH" >> "$GITHUB_OUTPUT"
          echo "task_sha=$TASK_SHA" >> "$GITHUB_OUTPUT"

          gh api "repos/JuniYadi/ide-projects/contents/$TASK_PATH" \
            --jq '.content' | base64 -d > /tmp/task.md
          echo "$TASK_SHA" > /tmp/task.sha

      - name: Checkout projects-green @ branch
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/projects-green
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch }}
          path: projects-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Prepare env + install deps
        working-directory: projects-green
        run: |
          cp .env.example .env
          bun install --frozen-lockfile
          bun run db:generate

      - name: Get PR review fix prompt
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_id }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "${{ inputs.branch }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          if [ -n "$PR_NUMBER" ]; then
            gh api "repos/JuniYadi/projects-green/pulls/$PR_NUMBER/reviews" --jq '.[] | select(.state == "CHANGES_REQUESTED") | .body' > /tmp/review-body.md 2>&1 || true
          else
            echo "" > /tmp/review-body.md
          fi
          echo "REVIEW_FILE_SIZE=$(wc -c < /tmp/review-body.md)"
          echo '' | base64 -d > /tmp/extract-fix-prompt.py && FIX_RESULT=$(python3 /tmp/extract-fix-prompt.py 2>&1) && echo "fix_prompt_found=$FIX_RESULT" >> "$GITHUB_OUTPUT" || echo "fix_prompt_found=false" >> "$GITHUB_OUTPUT"

      - name: Show fix prompt status
        run: |
          echo "PR #${{ steps.review.outputs.pr_number }}"
          echo "Fix prompt found: ${{ steps.review.outputs.fix_prompt_found }}"

      - name: Claude Code ŌĆö Apply Fixes
        if: steps.review.outputs.fix_prompt_found == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          display_report: true
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model ${{ secrets.FIX_ANTHROPIC_MODEL }}
            --max-turns 120
            --dangerously-skip-permissions
            --allowedTools "Bash(bun*),Bash(node*),Bash(npx*),Bash(git*),Bash(gh*),Bash(cat*),Bash(find*),Bash(grep*),Bash(ls*),Bash(cp*),Bash(mv*),Bash(rm*),Bash(sed*),Bash(mkdir*),Bash(touch*),Bash(tee*),Bash(date*),Bash(which*),Bash(dirname*),Bash(basename*),Bash(sort*),Bash(uniq*),Bash(wget*),Bash(curl*)"
          prompt: |
            /ponytail:ponytail
            REPO: JuniYadi/projects-green
            WORKING DIRECTORY: projects-green/
            BRANCH: ${{ inputs.branch }}
            PR NUMBER: ${{ steps.review.outputs.pr_number }}

            YOUR ROLE:
            You are applying PR review fixes from Claude Code Review.
            The review identified issues with the code and requested changes.

            STEP 1 ŌĆö READ CONTEXT:
            `cat projects-green/AGENTS.md` ŌĆö repo rules (DTO layer, Prisma types, etc.)

            STEP 2 ŌĆö READ THE FIX PROMPT OR REVIEW:
            `cat /tmp/fix-prompt.md` ŌĆö this contains either:
            - An "AI Refactoring Prompt" with exact file paths and code patches (structured format), OR
            - The raw PR review body with issue descriptions (fallback when no structured prompt exists)

            STEP 3 ŌĆö ANALYZE AND FIX EACH ISSUE:
            - If structured prompt: follow each instruction exactly as specified
            - If raw review body: parse each issue, identify the files/lines to fix, apply the fix
            For each issue:
            1. Read the affected file
            2. Apply the fix
            3. Do not leave any issue unfixed

            STEP 4 ŌĆö PUSH CODE (safety save):
            ```bash
            cd projects-green
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            git add -A
            git commit -m "fix: ${{ inputs.task_id }} address PR review feedback" --allow-empty
            git push
            ```

            STEP 5 ŌĆö 3 PILLARS (one at a time, amend + push each):
            5a. `cd projects-green && bun run lint` ŌĆö fix then amend commit
            5b. `cd projects-green && bun run typecheck` ŌĆö fix then amend commit
            5c. `cd projects-green && bun run test` ŌĆö fix then amend commit

      - name: Report if no fix prompt found
        if: steps.review.outputs.fix_prompt_found != 'true'
        run: |
          echo "::warning::No AI Refactoring Prompt found in PR #${{ steps.review.outputs.pr_number }} reviews"
          echo "Check the reviews manually: gh pr view ${{ steps.review.outputs.pr_number }} --json reviews"

      - name: Update task status in ide-projects
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        run: |
          if [ -f /tmp/task.md ]; then
            # Read current content + SHA from API (always get latest)
            RESPONSE=$(gh api "repos/JuniYadi/ide-projects/contents/${{ steps.task.outputs.task_path }}")
            CURRENT_CONTENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)
            CURRENT_SHA=$(echo "$RESPONSE" | jq -r '.sha')
            # Apply status update
            echo "$CURRENT_CONTENT" | sed 's/^## Current Status:.*/## Current Status: `review`/' | base64 -w0 > /tmp/new-task.b64
            gh api "repos/JuniYadi/ide-projects/contents/${{ steps.task.outputs.task_path }}" \
              -X PUT \
              -f message="task: ${{ inputs.task_id }} review fixes applied" \
              -f content="$(cat /tmp/new-task.b64)" \
              -f sha="$CURRENT_SHA" \
              -f committer.name="JuniYadi" \
              -f committer.email="31454084+JuniYadi@users.noreply.github.com"
            echo "Ō£ģ Task status updated to review in ide-projects"
          else
            echo "ŌÜĀ’ĖÅ /tmp/task.md not found ŌĆö skipping status update"
          fi
