name: Agent Orchestrator
on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Task ID (e.g., PGREEN-097)"
        required: true
        type: string
      branch:
        description: "Branch on projects-green (e.g., feature/PGREEN-097)"
        required: true
        type: string
      pr_id:
        description: "PR number (optional — avoids branch lookup)"
        required: false
        type: string
      mode:
        description: "plan | execute | fix"
        required: true
        type: choice
        options: [plan, execute, fix]

env:
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  API_TIMEOUT_MS: "3000000"
  GIT_EMAIL: 31454084+JuniYadi@users.noreply.github.com

jobs:
  plan:
    if: inputs.mode == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout ide-projects
        uses: actions/checkout@v7
        with:
          repository: JuniYadi/ide-projects
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          path: ide
          fetch-depth: 0

      - name: Claude Code — Write Plan
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          display_report: true
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model ${{ secrets.PLAN_ANTHROPIC_MODEL }}
            --max-turns 125
            --dangerously-skip-permissions
            --allowedTools "Bash(cat*),Bash(git*),Bash(head*),Bash(date*),Bash(sed*),Bash(echo*),Bash(tee*),Bash(ls*),Bash(find*),Bash(mkdir*)"
          prompt: |
            /ponytail:ponytail
            TASK: ${{ inputs.task_id }}
            TASK DIR: ide/projects-green/_tasks/active/

            Senior engineer writing an implementation plan. Plan-only — no source code changes.

            1. READ CONTEXT:
               ```
               ls "$TASK_DIR"/*${{ inputs.task_id }}*.md
               cat "$TASK_DIR"/*${{ inputs.task_id }}*.md
               cat ide/projects-green/AGENTS.md
               cat ide/RULES.md
               head -200 ide/projects-green/FEATURES.md
               ```

            2. WRITE PLAN into task file's `## Plan` section:
               - ### Approach — self-contained technical description
               - ### Files to Create / Modify — Action|File|Description table
               - ### Key Implementation Details — edge cases, code notes
               - ### Questions / Blockers — or ✅ None

               Format:
               ```
               ## Plan
               > **Status:** ✅ Done
               > **Generated:** $(date +%Y-%m-%d\ %H:%M)
               ### Approach
               ...
               ```
               Set `## Current Status:` to `plan`.

            3. PUSH:
               ```
               git -C ide config user.name "JuniYadi"
               git -C ide config user.email "${{ env.GIT_EMAIL }}"
               git -C ide add -A
               git -C ide commit -m "plan: ${{ inputs.task_id }} generated"
               git -C ide pull --rebase origin main
               git -C ide push
               ```

  execute:
    if: inputs.mode == 'execute'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout ide-projects
        uses: actions/checkout@v7
        with:
          repository: JuniYadi/ide-projects
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          path: ide
          fetch-depth: 0

      - name: Checkout projects-green @ branch
        uses: actions/checkout@v7
        with:
          repository: JuniYadi/projects-green
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          ref: ${{ inputs.branch }}
          path: projects-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Show versions
        run: |
          bun --version && node --version && uname -a && date

      - name: Prepare env + install deps
        working-directory: projects-green
        run: |
          cp .env.example .env
          bun install --frozen-lockfile
          bun run db:generate

      - name: Claude Code — Implement
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          display_report: true
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model ${{ secrets.EXECUTE_ANTHROPIC_MODEL }}
            --max-turns 200
            --dangerously-skip-permissions
            --allowedTools "Bash(bun*),Bash(node*),Bash(npx*),Bash(git*),Bash(gh*),Bash(cat*),Bash(find*),Bash(grep*),Bash(ls*),Bash(cp*),Bash(mv*),Bash(rm*),Bash(sed*),Bash(mkdir*),Bash(touch*),Bash(tee*),Bash(date*),Bash(which*),Bash(dirname*),Bash(basename*),Bash(sort*),Bash(uniq*),Bash(wget*),Bash(curl*),mcp__github_*"
          prompt: |
            /ponytail:ponytail
            TASK: ${{ inputs.task_id }}
            BRANCH: ${{ inputs.branch }}
            WORKDIR: projects-green/
            TASK DIR: ../ide/projects-green/_tasks/active/

            Senior engineer implementing a feature. Code in WORKDIR, task spec in TASK DIR.

            0. REBASE ONTO LATEST MAIN:
               Your branch may be behind origin/main if other PRs merged
               while the draft PR was open. Rebase first to ensure you're
               working against the latest code. Handle any conflicts.
               ```bash
               cd projects-green
               git config user.name "JuniYadi"
               git config user.email "31454084+JuniYadi@users.noreply.github.com"
               git pull --rebase origin main
               ```

            1. READ TASK:
               ```
               TASK_FILE="$(ls "$TASK_DIR"/*${{ inputs.task_id }}*.md | head -1)"
               cat "$TASK_FILE"
               cat ../ide/projects-green/AGENTS.md
               cat WORKDIR/AGENTS.md
               ls WORKDIR/modules/
               grep '\- \[ \]' "$TASK_FILE"  # unchecked ACs
               ```

            2. AC-BY-AC LOOP (one unchecked AC at a time):

               a. Implement AC in WORKDIR

               b. Commit + push code:
                  ```
                  cd WORKDIR
                  git config user.name "JuniYadi"
                  git config user.email "31454084+JuniYadi@users.noreply.github.com"
                  SHORT_DESC=$(echo "[AC description]" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | cut -c1-50)
                  git add -A && git commit -m "feat(${{ inputs.task_id }}): $SHORT_DESC" && git push
                  ```

               c. Update task file — mark AC done:
                  ```
                  COMMIT_SHA=$(cd WORKDIR && git rev-parse --short HEAD)
                  sed -i "0,/^- \[ \]/{s//- [x] ($COMMIT_SHA)/}" "$TASK_FILE"
                  git -C ../ide config user.name "JuniYadi"
                  git -C ../ide config user.email "31454084+JuniYadi@users.noreply.github.com"
                  git -C ../ide add -A
                  git -C ../ide commit -m "task: ${{ inputs.task_id }} — $SHORT_DONE [sha:$COMMIT_SHA]"
                  git -C ../ide pull --rebase origin main && git -C ../ide push
                  ```

               Loop for next unchecked AC.

            3. VALIDATE — cuma file yang berubah:
               ```bash
               # Files changed in this branch
               CHANGED=$(git diff --name-only origin/main...HEAD)

               # Lint file ts/tsx aja
               echo "$CHANGED" | grep -E '\.(ts|tsx)$' | xargs bun run lint --file 2>/dev/null || true

               # Typecheck — jalan global, tapi Claude abaikan error pre-existing,
               # hanya fix error di file sendiri
               bun run typecheck 2>&1

               # Test — cuma module terkait
               for mod in $(echo "$CHANGED" | grep -oP 'modules/[^/]+' | sort -u); do
                 bun test --filter "$(basename $mod)" 2>/dev/null || true
               done

               # Commit fix kalo ada perubahan
               git diff --quiet || {
                 git add -A
                 git commit -m "fix(${{ inputs.task_id }}): pass 3 pillars on changed files"
                 git push
               }
               ```

            4. MARK PR READY:
               ```
               PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
               if [ -n "$PR" ]; then gh pr ready "$PR"; fi
               ```

            5. FINALIZE TASK:
               ```
               sed -i 's/^## Current Status:.*/## Current Status: `implementation`/' "$TASK_FILE"
               sed -i 's/> \*\*Status:\*\* .*/> **Status:** ✅ Done/' "$TASK_FILE"
               sed -i 's/> \*\*Implemented:\*\* .*/> **Implemented:** '"$(date +%Y-%m-%d)"'/' "$TASK_FILE"
               gh pr view "$PR" --json files --jq '.files[].path' | while read f; do echo "- \`$f\`" >> "$TASK_FILE"; done
               git -C ../ide add -A
               git -C ../ide commit -m "task: ${{ inputs.task_id }} implementation done"
               git -C ../ide pull --rebase origin main && git -C ../ide push
               ```

      - name: Ensure task status saved
        if: always()
        run: |
          TASK_FILE=$(ls ide/projects-green/_tasks/active/*${{ inputs.task_id }}*.md 2>/dev/null | head -1)
          if [ -n "$TASK_FILE" ]; then
            git -C ide config user.name "JuniYadi"
            git -C ide config user.email "${{ env.GIT_EMAIL }}"
            git -C ide add -A
            git -C ide commit -m "task: ${{ inputs.task_id }} checkpoint" || true
            git -C ide pull --rebase origin main
            git -C ide push
          fi

  fix:
    if: inputs.mode == 'fix'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout ide-projects
        uses: actions/checkout@v7
        with:
          repository: JuniYadi/ide-projects
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          path: ide
          fetch-depth: 0

      - name: Checkout projects-green @ branch
        uses: actions/checkout@v7
        with:
          repository: JuniYadi/projects-green
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          ref: ${{ inputs.branch }}
          path: projects-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Prepare env + install deps
        working-directory: projects-green
        run: |
          cp .env.example .env
          bun install --frozen-lockfile
          bun run db:generate

      - name: Get PR review fix prompt
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_id }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "${{ inputs.branch }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUMBER" ]; then
            echo "fix_prompt_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch requested-changes review body
          gh api "repos/JuniYadi/projects-green/pulls/$PR_NUMBER/reviews" \
            --jq '.[] | select(.state == "CHANGES_REQUESTED") | .body' > /tmp/review-body.md 2>&1 || true

          # Extract AI Refactoring Prompt section (or use full body as fallback)
          python3 <<-'PYEOF'
          import re
          with open('/tmp/review-body.md') as f:
              content = f.read()
          # Match ```markdown block under "AI Refactoring Prompt"
          match = re.search(
              r'AI Refactoring Prompt.*?\x60\x60\x60\x60markdown\n?(.*?)\x60\x60\x60\x60',
              content, re.DOTALL
          )
          with open('/tmp/fix-prompt.md', 'w') as out:
              out.write(match.group(1).strip() if match else content)
          with open('/tmp/fix-found.txt', 'w') as out:
              out.write('true' if (match or content.strip()) else 'false')
          PYEOF

          echo "fix_prompt_found=$(cat /tmp/fix-found.txt)" >> "$GITHUB_OUTPUT"

      - name: Claude Code — Apply Fixes
        if: steps.review.outputs.fix_prompt_found == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          display_report: true
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model ${{ secrets.FIX_ANTHROPIC_MODEL }}
            --max-turns 120
            --dangerously-skip-permissions
            --allowedTools "Bash(bun*),Bash(node*),Bash(npx*),Bash(git*),Bash(gh*),Bash(cat*),Bash(find*),Bash(grep*),Bash(ls*),Bash(cp*),Bash(mv*),Bash(rm*),Bash(sed*),Bash(mkdir*),Bash(touch*),Bash(tee*),Bash(date*),Bash(which*),Bash(dirname*),Bash(basename*),Bash(sort*),Bash(uniq*),Bash(wget*),Bash(curl*),mcp__github_*"
          prompt: |
            /ponytail:ponytail
            TASK: ${{ inputs.task_id }}
            BRANCH: ${{ inputs.branch }}
            PR: ${{ steps.review.outputs.pr_number }}
            WORKDIR: projects-green/
            TASK DIR: ../ide/projects-green/_tasks/active/

            Senior engineer applying PR review fixes.

            0. REBASE ONTO LATEST MAIN:
               Your branch may be behind origin/main if other PRs merged
               while the draft PR was open. Rebase first so fixes apply
               against the latest code. Handle any conflicts.
               ```
               cd WORKDIR
               git config user.name "JuniYadi"
               git config user.email "31454084+JuniYadi@users.noreply.github.com"
               git pull --rebase origin main
               ```

            1. READ CONTEXT:
               ```
               cat WORKDIR/AGENTS.md
               cat /tmp/fix-prompt.md
               cat "$TASK_DIR"/*${{ inputs.task_id }}*.md
               ```

            2. FIX EACH ISSUE from /tmp/fix-prompt.md.
               For each: read the affected file, apply the fix.

            3. COMMIT + PUSH:
               ```
               cd WORKDIR
               git config user.name "JuniYadi"
               git config user.email "31454084+JuniYadi@users.noreply.github.com"
               git add -A && git commit -m "fix: ${{ inputs.task_id }} address PR review feedback" --allow-empty && git push
               ```

            # Note: 3 pillars (lint/typecheck/test) di-skip di fix mode.
            # CI (typecheck-build.yml + coverage-codecov.yml) akan validasi
            # setelah PR ready. Monitor akan trigger fix ulang kalau ada
            # check failure yang legit dari perubahan kita, bukan dari PR lain.

      - name: Report if no fix prompt found
        if: steps.review.outputs.fix_prompt_found != 'true'
        run: |
          echo "::warning::No AI Refactoring Prompt found in PR #${{ steps.review.outputs.pr_number }} reviews"

      - name: Ensure task status saved
        if: always()
        run: |
          TASK_FILE=$(ls ide/projects-green/_tasks/active/*${{ inputs.task_id }}*.md 2>/dev/null | head -1)
          if [ -n "$TASK_FILE" ]; then
            git -C ide config user.name "JuniYadi"
            git -C ide config user.email "${{ env.GIT_EMAIL }}"
            git -C ide add -A
            git -C ide commit -m "fix: ${{ inputs.task_id }} review fix applied" || true
            git -C ide pull --rebase origin main
            git -C ide push
          fi
