name: Agent Orchestrator
on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID (e.g., PGREEN-097)'
        required: true
        type: string
      branch:
        description: 'Branch on projects-green (e.g., feature/PGREEN-097)'
        required: true
        type: string
      pr_id:
        description: 'PR number (optional — avoids branch lookup)'
        required: false
        type: string
      mode:
        description: 'plan | execute | fix'
        required: true
        type: choice
        options: [plan, execute, fix]

env:
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  API_TIMEOUT_MS: "3000000"
  IDE_PROJECTS_REPO: JuniYadi/ide-projects
  GIT_EMAIL: 31454084+JuniYadi@users.noreply.github.com

jobs:
  plan:
    if: inputs.mode == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout ide-projects (private)
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/ide-projects
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          path: ide-projects
          fetch-depth: 0

      - name: Locate task file
        id: task
        run: |
          TASK_FILE=$(find ide-projects -path "*/projects-green/_tasks/active/${{ inputs.task_id }}-*.md" | head -1)
          if [ -z "$TASK_FILE" ]; then
            echo "::error::Task file not found for ${{ inputs.task_id }} in ide-projects/projects-green/_tasks/active/"
            find ide-projects -path "*/_tasks/active/*" -maxdepth 4 | head -10
            exit 1
          fi
          echo "task_file=$TASK_FILE" >> "$GITHUB_OUTPUT"
          echo "task_filename=$(basename "$TASK_FILE")" >> "$GITHUB_OUTPUT"
          echo "task_dir=$(dirname "$TASK_FILE")" >> "$GITHUB_OUTPUT"

      - name: Claude Code — Write Plan
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.PAT_IDE_PROJECTS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model "auto[1m]"
            --max-turns 125
            --dangerously-skip-permissions
            --allowedTools "Bash(cat*),Bash(git*),Bash(head*),Bash(date*),Bash(sed*),Bash(echo*),Bash(tee*),Bash(ls*),Bash(find*)"
          prompt: |
            /ponytail:ponytail
            REPO: JuniYadi/projects-green (Next.js 16 + TypeScript + strict + Bun)
            IDE PROJECTS: JuniYadi/ide-projects (private — planning docs)
            TASK FILE: ${{ steps.task.outputs.task_file }}

            YOUR ROLE:
            You are a senior software engineer writing an implementation plan. You work in TWO repos:
            - ide-projects/ — read task spec, write plan, push back
            - You DON'T touch the source code — this is plan-only

            STEP 1 — READ CONTEXT:
            Read the task file:
            `cat "${{ steps.task.outputs.task_file }}"`

            Read the project AGENTS.md (architecture, conventions, module layout):
            `cat ide-projects/projects-green/AGENTS.md`

            Read the FEATURES.md if the task references a feature area:
            `head -200 ide-projects/projects-green/FEATURES.md`

            Read the RULES.md for git/task conventions:
            `cat ide-projects/RULES.md`

            STEP 2 — UNDERSTAND THE TASK:
            - What is the goal?
            - What files need to change (check projects-green/ directory structure)?
            - What is the technical approach?
            - What are the acceptance criteria?
            - Are there existing tests for the affected area?

            STEP 3 — WRITE THE PLAN:
            Fill the `## Plan` section in the task file. The template expects:

            1. ### Approach — self-contained technical description
            2. ### Files to Create / Modify — table with Action, File, Description
            3. ### Key Implementation Details — specific code notes, edge cases
            4. ### Questions / Blockers — or ✅ None

            Use this EXACT format for the plan heading:
            ```
            ## Plan

            > **Status:** ✅ Done
            > **Generated:** $(date +%Y-%m-%d\ %H:%M)

            ### Approach
            ...
            ```

            Update `## Current Status:` line to `plan` (it should already be `plan` or `draft`).

            STEP 4 — COMMIT & PUSH:
            ```bash
            cd ide-projects
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            git add -A
            git commit -m "task: ${{ inputs.task_id }} plan generated"
            git push
            ```

            DONE — the plan is now in the private ide-projects repo.

  execute:
    if: inputs.mode == 'execute'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout ide-projects (private)
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/ide-projects
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          path: ide-projects
          fetch-depth: 0

      - name: Locate task file
        id: task
        run: |
          TASK_FILE=$(find ide-projects -path "*/projects-green/_tasks/active/${{ inputs.task_id }}-*.md" | head -1)
          if [ -z "$TASK_FILE" ]; then
            echo "::error::Task file not found for ${{ inputs.task_id }}"
            exit 1
          fi
          echo "task_file=$TASK_FILE" >> "$GITHUB_OUTPUT"

      - name: Checkout projects-green @ branch
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/projects-green
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch }}
          path: projects-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Show versions
        run: |
          bun --version
          node --version
          uname -a
          date

      - name: Prepare env + install deps
        working-directory: projects-green
        run: |
          cp .env.example .env
          for line in $(grep -v '^#' .env | grep '='); do
            key=$(echo "$line" | cut -d'=' -f1)
            # Skip known secret keys — avoid leaking to logs
            case "$key" in
              *DATABASE*|*REDIS*|*SECRET*|*KEY*|*TOKEN*|*PASSWORD*|*WORKOS*|*GITHUB*|*ANTHROPIC*|*AUTH*)
                continue ;;
            esac
            value=$(echo "$line" | cut -d'=' -f2- | sed 's/^"*//;s/"*$//')
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done
          bun install --frozen-lockfile
          bun run db:generate

      - name: Claude Code — Implement
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model "auto[1m]"
            --max-turns 200
            --dangerously-skip-permissions
            --allowedTools "Bash(bun*),Bash(node*),Bash(npx*),Bash(git*),Bash(gh*),Bash(cat*),Bash(find*),Bash(grep*),Bash(ls*),Bash(cp*),Bash(mv*),Bash(rm*),Bash(sed*),Bash(mkdir*),Bash(touch*),Bash(tee*),Bash(date*),Bash(which*),Bash(dirname*),Bash(basename*),Bash(sort*),Bash(uniq*),Bash(wget*),Bash(curl*)"
          prompt: |
            /ponytail:ponytail
            REPO: JuniYadi/projects-green
            WORKING DIRECTORY: projects-green/
            TASK FILE: ${{ steps.task.outputs.task_file }}
            BRANCH: ${{ inputs.branch }}

            YOUR ROLE:
            You are a senior software engineer implementing a task. You work across TWO repos:
            - ide-projects/ — read the task spec + plan (private, planning docs)
            - projects-green/ — THIS is where you write code

            IMPORTANT: All git operations for projects-green happen INSIDE `projects-green/`.
            The task file is at `${{ steps.task.outputs.task_file }}`.

            STEP 1 — READ CONTEXT:
            `cat "${{ steps.task.outputs.task_file }}"` — read the full task + plan

            `cat ide-projects/projects-green/AGENTS.md` — project AGENTS.md

            `cat projects-green/AGENTS.md` — repo rules (Prisma types, DTO layer, etc.)

            `ls projects-green/modules/` — see all feature modules

            STEP 2 — LIST ACCEPTANCE CRITERIA:
            Parse the task file and list all unchecked AC checkboxes:
            `grep -- '- \[ \]' "${{ steps.task.outputs.task_file }}"` — these are your ACs.

            STEP 3 — AC-BY-AC LOOP (one AC at a time):
            For EACH unchecked Acceptance Criteria, in order. Continue until all are marked [x].

            3a. IMPLEMENT THIS AC:
            - Pick ONE AC (e.g. "Add step/status to VpnAuditLog")
            - Work ONLY on files relevant to this AC
            - Read current file if modifying, then make the change
            - Run relevant tests: `cd projects-green && bun test --bail`

            3b. COMMIT + PUSH (progress checkpoint):
            ```bash
            cd projects-green
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            SHORT_DESC=$(echo "[AC description]" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | cut -c1-50)
            git add -A
            git commit -m "feat(${{ inputs.task_id }}): $SHORT_DESC"
            git push
            ```

            3c. UPDATE TASK FILE — mark AC done + record commit SHA:
            ```bash
            cd ide-projects
            COMMIT_SHA=$(cd ../projects-green && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            # Mark the first unchecked checkbox as [x] with SHA
            sed -i '0,/^- \[ \]/{s//- [x] ('"$COMMIT_SHA"')/}' "${{ steps.task.outputs.task_file }}"
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            git add -A
            git commit -m "task: ${{ inputs.task_id }} — $SHORT_DESC done [sha:$COMMIT_SHA]"
            git push
            cd ../projects-green
            ```
            --- IMPORTANT ---
            After pushing, a new GHA run may auto-trigger on the branch. Keep working.
            If you run out of turns partway through, that's OK — pushed code and
            updated checklist mean the next run picks up where you left off.
            All done with this AC. Loop back to 3a for the next unchecked one.

            STEP 4 — FINAL 3 PILLARS (once, after ALL ACs done):
            Run each separately. Fix, amend the LAST commit, and push before moving to the next.

            4a. `cd projects-green && bun run lint` — 0 errors
            If it fails, fix the lint errors, then:
            `git add -A && git commit --amend --no-edit && git push --force-with-lease`

            4b. `cd projects-green && bun run typecheck` — 0 errors
            If it fails, fix the type errors, then:
            `git add -A && git commit --amend --no-edit && git push --force-with-lease`

            4c. `cd projects-green && bun run test` — all pass
            If it fails, fix the test failures, then:
            `git add -A && git commit --amend --no-edit && git push --force-with-lease`

            If any pillar fails and you can't fix it in time, push the fix anyway
            (even with errors) — the code is already checkpointed per AC.

            STEP 5 — MARK PR READY:
            ```bash
            PR_NUMBER=$(gh pr list --head "${{ inputs.branch }}" --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$PR_NUMBER" ]; then
              gh pr ready "$PR_NUMBER"
              echo "PR #$PR_NUMBER marked as ready for review"
            else
              echo "No open PR found for branch ${{ inputs.branch }}"
            fi
            ```

            STEP 6 — FINAL TASK STATUS UPDATE:
            ```bash
            cd ide-projects
            BRANCH_NAME="${{ inputs.branch }}"
            PR_URL=$(cd projects-green && gh pr list --repo JuniYadi/projects-green --head "$BRANCH_NAME" --json number,url --jq '.[0]' 2>/dev/null || echo "{}")
            PR_NUMBER=$(echo "$PR_URL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('number',''))" 2>/dev/null || echo "")
            sed -i 's/^## Current Status:.*/## Current Status: `implementation`/' "${{ steps.task.outputs.task_file }}"
            sed -i '/^### PR Details$/a\\\\' "${{ steps.task.outputs.task_file }}"
            sed -i '/^### PR Details$/a- **PR URL:** https://github.com/JuniYadi/projects-green/pull/'"$PR_NUMBER" "${{ steps.task.outputs.task_file }}"
            sed -i '/^### PR Details$/a- **Branch:** `'"$BRANCH_NAME"'`' "${{ steps.task.outputs.task_file }}"
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            git add -A
            git commit -m "task: ${{ inputs.task_id }} implementation done"
            git push
            ```

  fix:
    if: inputs.mode == 'fix'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout ide-projects (private)
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/ide-projects
          token: ${{ secrets.PAT_IDE_PROJECTS }}
          path: ide-projects
          fetch-depth: 0

      - name: Locate task file
        id: task
        run: |
          TASK_FILE=$(find ide-projects -path "*/projects-green/_tasks/active/${{ inputs.task_id }}-*.md" | head -1)
          echo "task_file=$TASK_FILE" >> "$GITHUB_OUTPUT"

      - name: Checkout projects-green @ branch
        uses: actions/checkout@v4
        with:
          repository: JuniYadi/projects-green
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.branch }}
          path: projects-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Prepare env + install deps
        working-directory: projects-green
        run: |
          cp .env.example .env
          bun install --frozen-lockfile
          bun run db:generate

      - name: Get PR review fix prompt
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_id }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "${{ inputs.branch }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          if [ -n "$PR_NUMBER" ]; then
            gh api "repos/JuniYadi/projects-green/pulls/$PR_NUMBER/reviews" --jq '.[] | select(.state == "CHANGES_REQUESTED") | .body' > /tmp/review-body.md 2>&1 || true
          else
            echo "" > /tmp/review-body.md
          fi
          echo "REVIEW_FILE_SIZE=$(wc -c < /tmp/review-body.md)"
          echo '' | base64 -d > /tmp/extract-fix-prompt.py && FIX_RESULT=$(python3 /tmp/extract-fix-prompt.py 2>&1) && echo "fix_prompt_found=$FIX_RESULT" >> "$GITHUB_OUTPUT" || echo "fix_prompt_found=false" >> "$GITHUB_OUTPUT"

      - name: Show fix prompt status
        run: |
          echo "PR #${{ steps.review.outputs.pr_number }}"
          echo "Fix prompt found: ${{ steps.review.outputs.fix_prompt_found }}"

      - name: Claude Code — Apply Fixes
        if: steps.review.outputs.fix_prompt_found == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          track_progress: false
          show_full_output: false
          plugin_marketplaces: 'https://github.com/DietrichGebert/ponytail.git'
          plugins: 'ponytail@ponytail'
          claude_args: >-
            --model "auto[1m]"
            --max-turns 120
            --dangerously-skip-permissions
            --allowedTools "Bash(bun*),Bash(node*),Bash(npx*),Bash(git*),Bash(gh*),Bash(cat*),Bash(find*),Bash(grep*),Bash(ls*),Bash(cp*),Bash(mv*),Bash(rm*),Bash(sed*),Bash(mkdir*),Bash(touch*),Bash(tee*),Bash(date*),Bash(which*),Bash(dirname*),Bash(basename*),Bash(sort*),Bash(uniq*),Bash(wget*),Bash(curl*)"
          prompt: |
            /ponytail:ponytail
            REPO: JuniYadi/projects-green
            WORKING DIRECTORY: projects-green/
            BRANCH: ${{ inputs.branch }}
            PR NUMBER: ${{ steps.review.outputs.pr_number }}

            YOUR ROLE:
            You are applying PR review fixes from Claude Code Review.
            The review identified issues and provided an "AI Refactoring Prompt".

            STEP 1 — READ CONTEXT:
            `cat projects-green/AGENTS.md` — repo rules (DTO layer, Prisma types, etc.)

            STEP 2 — READ THE FIX PROMPT:
            `cat /tmp/fix-prompt.md` — exact instructions with file paths and code

            STEP 3 — APPLY FIXES:
            For each issue:
            1. Read the affected file
            2. Apply the fix exactly as specified
            3. Do not deviate from the fix prompt

            STEP 4 — PUSH CODE (safety save):
            ```bash
            cd projects-green
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            git add -A
            git commit -m "fix: ${{ inputs.task_id }} address PR review feedback" --allow-empty
            git push
            ```

            STEP 5 — 3 PILLARS (one at a time, amend + push each):
            5a. `cd projects-green && bun run lint` — fix then amend commit
            5b. `cd projects-green && bun run typecheck` — fix then amend commit
            5c. `cd projects-green && bun run test` — fix then amend commit

      - name: Report if no fix prompt found
        if: steps.review.outputs.fix_prompt_found != 'true'
        run: |
          echo "::warning::No AI Refactoring Prompt found in PR #${{ steps.review.outputs.pr_number }} reviews"
          echo "Check the reviews manually: gh pr view ${{ steps.review.outputs.pr_number }} --json reviews"

      - name: Update task status in ide-projects
        run: |
          TASK_FILE="$(echo "${{ steps.task.outputs.task_file }}" | sed 's|^ide-projects/||')"
          if [ -n "$TASK_FILE" ] && [ -f "$TASK_FILE" ]; then
            git config user.name "JuniYadi"
            git config user.email "31454084+JuniYadi@users.noreply.github.com"
            git pull --rebase origin main
            sed -i 's/^## Current Status:.*/## Current Status: `review`/' "$TASK_FILE"
            git add -A
            git commit -m "task: ${{ inputs.task_id }} review fixes applied" --allow-empty
            git push
          fi
        working-directory: ide-projects
